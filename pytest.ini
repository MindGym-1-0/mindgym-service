[pytest]
pythonpath = .
testpaths = tst
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: unit tests for isolated backend logic
    integration: integration tests that call real external services
    e2e: end-to-end journey tests — real Gemini, real Supabase, no mocks
